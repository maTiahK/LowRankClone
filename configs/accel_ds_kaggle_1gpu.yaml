# DeepSpeed ZeRO-2 config for Kaggle single GPU (H100 80GB or T4 16GB)
# Optimized for memory efficiency while maintaining speed

debug: false
deepspeed_config:
  gradient_accumulation_steps: 16
  gradient_clipping: 1.0
  offload_optimizer_device: none  # Change to "cpu" if OOM
  offload_param_device: none      # Change to "cpu" if OOM
  zero3_init_flag: false
  zero_stage: 2  # ZeRO-2: partition optimizer states + gradients

distributed_type: DEEPSPEED
downcast_bf16: 'no'
enable_cpu_affinity: false
machine_rank: 0
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 1  # Single GPU
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
